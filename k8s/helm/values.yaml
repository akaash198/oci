# OT/ICS Cybersecurity Platform - Helm Chart Values
# Override these values for different environments

# Global settings
global:
  imageRegistry: ghcr.io/your-org
  imagePullSecrets:
    - name: ghcr-secret

# Dashboard Application
dashboard:
  replicaCount: 3
  image:
    repository: ot-cybersecurity
    tag: latest
    pullPolicy: Always
  
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  
  service:
    type: ClusterIP
    port: 80
    targetPort: 3000
  
  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    hosts:
      - host: ot-security.your-domain.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: ot-dashboard-tls
        hosts:
          - ot-security.your-domain.com
  
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  
  podDisruptionBudget:
    enabled: true
    minAvailable: 2
  
  # Environment variables
  env:
    NODE_ENV: production
    LOG_LEVEL: info
    DETECTION_THRESHOLD: "0.7"
    AUTO_EXECUTE_PLAYBOOKS: "true"

# ML Inference Engine
mlEngine:
  enabled: true
  replicaCount: 2
  image:
    repository: ot-ml-engine
    tag: latest
    pullPolicy: Always
  
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  
  service:
    type: ClusterIP
    port: 8000
  
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 60
  
  # Model storage
  persistence:
    enabled: true
    size: 50Gi
    storageClass: standard
    accessMode: ReadWriteMany
  
  env:
    MODEL_PATH: /models
    LOG_LEVEL: INFO

# Redis for caching
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
    password: ""  # Set in secrets
  master:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    persistence:
      enabled: true
      size: 8Gi

# Prometheus monitoring
prometheus:
  enabled: true
  server:
    retention: 15d
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi
    persistentVolume:
      enabled: true
      size: 50Gi

# Grafana dashboards
grafana:
  enabled: true
  adminPassword: ""  # Set in secrets
  persistence:
    enabled: true
    size: 10Gi
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://prometheus-server
          access: proxy
          isDefault: true

# Network policies
networkPolicy:
  enabled: true

# Pod security
podSecurityPolicy:
  enabled: false

# Service mesh (Istio)
serviceMesh:
  enabled: false
  mtls: STRICT

# Secrets management
secrets:
  # Use external-secrets or sealed-secrets in production
  provider: kubernetes  # Options: kubernetes, external-secrets, vault
  externalSecrets:
    enabled: false
    refreshInterval: 1h
    secretStore:
      name: vault-backend
      kind: ClusterSecretStore

# Backup configuration
backup:
  enabled: false
  schedule: "0 2 * * *"
  retention: 30
  destination:
    type: s3
    bucket: ot-cybersecurity-backups
    region: us-east-1

# Monitoring and alerting
alerting:
  enabled: true
  slack:
    enabled: false
    channel: "#ot-security-alerts"
  pagerduty:
    enabled: false
  email:
    enabled: true
    recipients:
      - security-team@your-domain.com

# Log aggregation
logging:
  enabled: true
  provider: loki  # Options: loki, elasticsearch
  retention: 30d
